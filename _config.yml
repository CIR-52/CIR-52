# =========================================
# Hexo 主配置文件
# 文档：https://hexo.io/zh-cn/docs/configuration
# =========================================

# ------------------------------
# 站点基本信息设置
# ------------------------------

# 网站标题
title: CIR_52的个人博客

# 网站副标题
subtitle: ''

# 网站描述 (用于SEO)
description: '一个普通人搭建的网站'

# 网站关键词 (用于SEO)
keywords: 'CIR_52'

# 作者姓名
author: CIR_52

# 网站语言 (zh-CN 表示中文)
language: zh-CN

# 时区设置 (默认使用服务器时区)
timezone: ''

# ------------------------------
# URL 和永久链接设置
# ------------------------------

# 网站根URL (部署后访问地址)
url: https://cir-52.github.io/

# 文章永久链接格式
# 变量：:year=年, :month=月, :day=日, :title=标题
permalink: :year/:month/:day/:title/

# 永久链接默认值
permalink_defaults:

# 美化URL设置
pretty_urls:
  trailing_index: true  # 是否保留末尾的 'index.html'
  trailing_html: true   # 是否保留末尾的 '.html'

# ------------------------------
# 目录结构设置
# ------------------------------

source_dir: source      # 源文件目录 (存放Markdown)
public_dir: public      # 生成目录 (存放静态HTML)
tag_dir: tags           # 标签目录
archive_dir: archives   # 归档目录
category_dir: categories # 分类目录
code_dir: downloads/code # 代码目录
i18n_dir: :lang         # 国际化目录
skip_render:            # 跳过渲染的文件/目录

# ------------------------------
# 写作设置
# ------------------------------

# 新文章文件名格式
new_post_name: :title.md

# 默认布局模板
default_layout: post

# 是否自动转换标题大小写
titlecase: false

# 外部链接设置
external_link:
  enable: true   # 是否在新标签页打开外部链接
  field: site    # 应用范围 (site=全站)
  exclude: ''    # 排除的域名

# 文件名大小写转换 (0=不转换, 1=小写, 2=大写)
filename_case: 0

# 是否渲染草稿
render_drafts: false

# 是否为每篇文章创建资源文件夹
post_asset_folder: false

# 是否使用相对链接
relative_link: false

# 是否显示未来日期的文章
future: true

# 代码高亮设置
syntax_highlighter: highlight.js
highlight:
  line_number: true   # 显示行号
  auto_detect: false  # 自动检测语言
  tab_replace: ''     # 替换制表符
  wrap: true          # 包裹代码块
  hljs: false         # 是否使用hljs样式

# Prism.js 高亮设置
prismjs:
  preprocess: true    # 预处理
  line_number: true   # 显示行号
  tab_replace: ''     # 替换制表符

# ------------------------------
# 首页生成设置
# ------------------------------

index_generator:
  path: ''            # 首页路径 (默认为根目录)
  per_page: 5        # 每页显示文章数 (0=禁用分页)
  order_by: -date     # 文章排序 (-date=按日期倒序)

# ------------------------------
# 分类和标签设置
# ------------------------------

# 默认分类名称
default_category: uncategorized

# 分类别名映射
category_map:

# 标签别名映射
tag_map:

# ------------------------------
# 元数据设置
# ------------------------------

# 是否生成 meta generator 标签
meta_generator: true

# ------------------------------
# 日期时间格式设置
# ------------------------------

# 日期格式 (使用Moment.js格式)
date_format: YYYY-MM-DD

# 时间格式
time_format: HH:mm:ss

# 文章更新时间选项：
#   'mtime' = 文件修改时间
#   'date' = 文章front-matter中的日期
#   'empty' = 不更新
updated_option: 'mtime'

# ------------------------------
# 分页设置
# ------------------------------

# 每页显示数量 (0=禁用分页)
per_page: 10

# 分页目录名称
pagination_dir: page

# ------------------------------
# 包含/排除文件设置
# ------------------------------

# 包含文件/目录
include:

# 排除文件/目录
exclude:

# 忽略文件/目录
ignore:

# 字数统计配置
symbols_count_time:
  symbols: true        # 显示字数统计
  time: true           # 显示阅读时间
  total_symbols: true  # 显示总字数
  total_time: true     # 显示总阅读时间
  exclude_codeblock: false  # 是否排除代码块

# ------------------------------
# 扩展设置
# ------------------------------

# 插件配置：https://hexo.io/plugins/
plugins:

# 主题配置 (当前使用vivia主题)
theme: vivia

# ------------------------------
# 部署设置
# ------------------------------

# 一键部署配置：https://hexo.io/zh-cn/docs/one-command-deployment
deploy:
  type: ''  # 部署类型 (git, heroku, rsync等)
  
  # 示例Git部署配置：
  #   type: git
  #   repo: <repository url>
  #   branch: [branch]
  #   message: [message]
  
  # 示例GitHub Pages配置：
  #   type: git
  #   repo: https://github.com/username/username.github.io.git
  #   branch: main